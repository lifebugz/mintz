name: Canary Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "dist-tag for this canary"
        default: "canary"
        required: true

concurrency: ${{ github.workflow }}

jobs:
  canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > "$HOME/.npmrc"

      - run: bun install --frozen-lockfile
      - run: bun test
      # `bun run test:types` is intentionally omitted; type-test files
      # do not exist yet (see commit 30d1cec). Re-add when type tests
      # land (Task 28 of the original mintz implementation plan).

      - name: Publish snapshot
        run: |
          bunx changeset version --snapshot ${{ inputs.tag }}
          bun run build
          bun publish --tag ${{ inputs.tag }} --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
