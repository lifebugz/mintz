name: Release

on:
  push:
    branches: [main]

# Only one release run at a time per branch — prevents two concurrent
# pushes from racing to open conflicting Version PRs.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag + GitHub Release
      pull-requests: write # open/update Version PR
      id-token: write # required for npm Trusted Publishing OIDC handshake + provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      # Diagnostic: confirm OIDC env vars are present in the runner.
      # Trusted publishing requires ACTIONS_ID_TOKEN_REQUEST_URL and
      # ACTIONS_ID_TOKEN_REQUEST_TOKEN to be set (auto-injected by GitHub
      # Actions when `id-token: write` is granted). If either is empty,
      # the issue is permissions, not npm version.
      - name: Verify OIDC env (does not print token values)
        run: |
          [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo "✓ ACTIONS_ID_TOKEN_REQUEST_URL is set" || echo "✗ ACTIONS_ID_TOKEN_REQUEST_URL is MISSING"
          [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ] && echo "✓ ACTIONS_ID_TOKEN_REQUEST_TOKEN is set" || echo "✗ ACTIONS_ID_TOKEN_REQUEST_TOKEN is MISSING"
          echo "bunx-resolved npm version: $(bunx npm@latest --version)"

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      # `bun run test:types` is intentionally omitted; type-test files
      # do not exist yet (see commit 30d1cec). Re-add when type tests
      # land (Task 28 of the original mintz implementation plan).

      - uses: changesets/action@v1
        with:
          version: bun run ci:version
          publish: bun run ci:publish
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
