name: Release

on:
  push:
    branches: [main]

# Only one release run at a time per branch — prevents two concurrent
# pushes from racing to open conflicting Version PRs.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag + GitHub Release
      pull-requests: write # open/update Version PR
      id-token: write # required for npm Trusted Publishing OIDC handshake + provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      # Bootstrap auth: NPM_TOKEN-based .npmrc until trusted publishing is
      # configured for `mintz` on npmjs.com (npm requires the package to
      # exist before trusted publishing can be set up). After v0.1.0 is
      # published and trusted publishing is configured, this step + the
      # NPM_TOKEN env below + the secret can be removed.
      - name: Configure npm auth (transitional)
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > "$HOME/.npmrc"

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      # `bun run test:types` is intentionally omitted; type-test files
      # do not exist yet (see commit 30d1cec). Re-add when type tests
      # land (Task 28 of the original mintz implementation plan).

      - uses: changesets/action@v1
        with:
          version: bun run ci:version
          publish: bun run ci:publish
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action checks process.env.NPM_TOKEN to decide between
          # token-mode and OIDC-mode. With both this env and id-token: write
          # set, the action prefers OIDC; falls through to token if OIDC
          # fails. Remove after trusted publishing is configured for `mintz`.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
